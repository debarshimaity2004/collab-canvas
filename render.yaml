services:
  # ── Backend: Express API + WebSocket (same port) ──────────────────────────
  - type: web
    name: collabcanvas-server
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @collab-canvas/types build && pnpm --filter @collab-canvas/server build
    startCommand: pnpm --filter @collab-canvas/server db:migrate:deploy && pnpm --filter @collab-canvas/server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: collabcanvas-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: collabcanvas-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # Set this manually in Render dashboard to the collabcanvas-web URL
      # e.g. https://collabcanvas-web.onrender.com
      - key: CORS_ORIGIN
        sync: false

  # ── Frontend: Next.js ──────────────────────────────────────────────────────
  - type: web
    name: collabcanvas-web
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @collab-canvas/types build && pnpm --filter @collab-canvas/web build
    startCommand: pnpm --filter @collab-canvas/web start
    envVars:
      - key: NODE_ENV
        value: production
      # Set this manually in Render dashboard to the collabcanvas-server URL
      # e.g. https://collabcanvas-server.onrender.com
      # The WebSocket URL is derived automatically (https → wss)
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: collabcanvas-redis
    plan: free
    ipAllowList: []

# ── PostgreSQL ─────────────────────────────────────────────────────────────
databases:
  - name: collabcanvas-db
    databaseName: collabcanvas
    user: collabcanvas
    plan: free
